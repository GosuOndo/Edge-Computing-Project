# Smart Medication System Configuration
# Copy this file to config.yaml and fill in your actual values

# System Settings
system:
  name: "Smart Medication Verification System"
  version: "1.0.0"
  location: "Singapore, SG"
  timezone: "Asia/Singapore"

# Hardware Configuration
hardware:
  camera:
    device_id: 0  # /dev/video0
    resolution: [640, 480]
    fps: 30
    
  display:
    width: 1024
    height: 600
    fullscreen: false
    
  audio:
    enabled: true
    volume: 0.8  # 0.0 to 1.0

# MQTT Configuration
mqtt:
  broker_host: "localhost"
  broker_port: 1883
  client_id: "medication_system_pi"
  topics:
    weight_data: "medication/weight/+"  # + is wildcard for station_id
    commands: "medication/command"
    status: "medication/status/+"
  qos: 1
  keepalive: 60

# Weight Sensor Configuration
weight_sensors:
  station_1:
    id: "station_1"
    medicine_name: "Aspirin 100mg"  # Set during setup
    pill_weight_mg: 280  # Average pill weight in milligrams (mayb 330?)
    threshold_stable_g: 0.05  # Stability threshold
    threshold_delta_g: 0.22  # Minimum change to trigger event
    event_settle_seconds: 1.5
    event_cooldown_seconds: 2.0
    min_delta_g: 0.20

# OCR Configuration
ocr:
  language: "eng"
  config: "--psm 11"  # Tesseract config: Assume a single uniform block of text
  min_confidence: 0.75
  preprocessing:
    grayscale: true
    denoise: true
    threshold: true

identity:
  primary_method: "tag"
  fallback_methods: ["qr", "ocr"]

  tag:
    enabled: true
    mqtt_topic: "medication/tag/read/+"
    max_attempts: 1
    attempt_timeout_seconds: 3

  qr:
    enabled: true
    max_attempts: 1

  ocr:
    enabled: true
    max_attempts: 1

# Patient Monitoring Configuration
patient_monitoring:
  enabled: true
  duration_seconds: 30       # how long to watch after pill removal
  fps: 20                    # capture frame rate
  device_id: 0
 
  # MediaPipe thresholds
  mediapipe:
    mouth_open_ratio: 0.04   # inner-lip gap / face height  (higher = harder to trigger)
    proximity_ratio:  0.18   # fingertip–mouth dist / frame min dim (higher = wider zone)
    cooldown_secs:    2.5    # min seconds between counted intakes (higher = less counting)
 
  detection:
    swallow:
      enabled: true
      sensitivity: 0.85     
      
    cough:
      enabled: false         
      sensitivity: 0.80
    hand_motion:
      enabled: true

# Telegram Bot Configuration
telegram:
  enabled: true
  bot_token: "YOUR_BOT_TOKEN_HERE"  # Get from @BotFather
  patient_chat_id: "YOUR_PATIENT_CHAT_ID"  # Get using /start command
  caregiver_chat_id: "YOUR_CAREGIVER_CHAT_ID"
  retry_attempts: 3
  retry_delay_seconds: 5

# Medication Schedule
# Format: time in 24-hour format, medicines as list
schedule:
  medications:
    - name: "Aspirin 100mg"
      station_id: "station_1"
      dosage_pills: 2
      times: ["08:00", "20:00"]
  
  reminder:
    advance_minutes: 5  # Remind 5 minutes before
    timeout_minutes: 30  # Consider missed after 30 minutes

# Decision Engine Rules
decision_engine:
  tolerance:
    pill_count: 0  # Allow plus minus 1 pill difference
  
  verification:
    require_ocr: false  # Set to true to require OCR match
    require_weight: true
    require_monitoring: true
  
  alerts:
    missed_dose: true
    incorrect_dosage: true
    behavioral_issue: true

# Database Configuration
database:
  path: "data/medication_events.db"
  backup_enabled: true
  backup_interval_hours: 24

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  console_output: true
  file_output: true
  max_file_size_mb: 10
  backup_count: 5

# Performance Configuration
performance:
  max_cpu_percent: 80
  max_memory_mb: 3072  # Leave 1GB for OS on 4GB Pi
  enable_throttling: true  # Reduce resolution/fps if overloaded

# Network Configuration
network:
  offline_mode_enabled: true  # Continue operation without internet
  queue_alerts: true  # Queue Telegram alerts when offline
  check_interval_seconds: 60

# Privacy Configuration
privacy:
  store_images: false  # Never store patient images
  store_video: false
  anonymize_logs: true
  data_retention_days: 30

# Measurement & Profiling (for validation)
profiling:
  enabled: false  # Enable during measurement phase
  latency_logging: true
  resource_logging: true
  log_interval_seconds: 1

