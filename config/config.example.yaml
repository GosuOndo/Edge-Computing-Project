# Smart Medication System Configuration
# Copy this file to config.yaml and fill in your actual values

# System Settings
system:
  name: "Smart Medication Verification System"
  version: "1.0.0"
  location: "Singapore, SG"
  timezone: "Asia/Singapore"

# Hardware Configuration
hardware:
  camera:
    device_id: 0  # /dev/video0
    resolution: [640, 480]
    fps: 30

  display:
    width: 1024
    height: 600
    fullscreen: false  # set to true for production deployment

  audio:
    enabled: true
    output_device: null  # e.g. "plughw:CARD=vc4hdmi0,DEV=0"
    volume: 0.8  # 0.0 to 1.0

# MQTT Configuration
mqtt:
  broker_host: "localhost"
  broker_port: 1883
  client_id: "medication_system_pi"
  topics:
    weight_data: "medication/weight/+"
    commands: "medication/command"
    status: "medication/status/+"
  qos: 1
  keepalive: 60

# Weight Sensor Configuration
weight_sensors:
  station_1:
    id: "station_1"
    tag_reader_id: "tag_reader_1"   # RFID reader mounted under this station's scale
    medicine_name: "Aspirin 100mg"  # updated automatically on registration
    pill_weight_mg: 290             # calibrated: 2 pills = ~0.58g delta -> 290mg each
    threshold_stable_g: 0.05        # stability threshold
    threshold_delta_g: 0.22         # minimum change to consider a delta
    event_settle_seconds: 1.5       # how long weight must be stable before firing
    event_cooldown_seconds: 2.0     # minimum gap between two events
    min_delta_g: 0.20               # below this = scale noise, not a pill removal

  station_2:
    id: "station_2"
    tag_reader_id: "tag_reader_2"   # RFID reader mounted under this station's scale
    medicine_name: "Paracetamol 500mg"  # updated automatically on registration
    pill_weight_mg: 290             # calibrated: 2 pills = ~0.58g delta -> 290mg each
    threshold_stable_g: 0.05        # stability threshold
    threshold_delta_g: 0.22         # minimum change to consider a delta
    event_settle_seconds: 1.5       # how long weight must be stable before firing
    event_cooldown_seconds: 2.0     # minimum gap between two events
    min_delta_g: 0.20               # below this = scale noise, not a pill removal

# OCR Configuration (fallback identity method)
ocr:
  language: "eng"
  config: "--psm 11"
  min_confidence: 0.75
  preprocessing:
    grayscale: true
    denoise: true
    threshold: true

# Identity Verification Configuration
# Primary: integrated RFID tag (bottle bottom tag, reader under scale)
# Fallback: QR code scan, then OCR label scan
identity:
  primary_method: "tag"
  fallback_methods: ["qr", "ocr"]

  tag:
    enabled: true
    mqtt_topic: "medication/tag/read/+"
    # integrated_mode: tag reader is mounted under the scale platform.
    # The bottle tag is read passively when the bottle is placed back,
    # so we use coincident timing instead of active waiting.
    integrated_mode: true
    # How far back (seconds) from the weight event to accept a tag scan.
    # Tag scan arrives when bottle touches reader (before weight settles),
    # so the scan is typically 1-5s older than the weight event timestamp.
    coincident_window_seconds: 15.0
    # Per-station MQTT command topics for scan gate control (start_scan / stop_scan).
    # Keys must match the station ids defined in weight_sensors above.
    command_topics:
      station_1: "medication/tag/command/tag_reader_1"
      station_2: "medication/tag/command/tag_reader_2"
    # Legacy active-wait settings (used only if integrated_mode: false)
    max_attempts: 1
    attempt_timeout_seconds: 3

  qr:
    enabled: true
    max_attempts: 1

  ocr:
    enabled: true
    max_attempts: 1

# Registration Configuration
# Runs once at startup for each station with no registered medicine.
# Detects a coincident stable weight + RFID tag scan to auto-register.
registration:
  enabled: true
  timeout_seconds: 120           # how long to wait before giving up
  coincident_window_seconds: 8.0 # tag scan must be within this many seconds of the stable weight reading
  min_bottle_weight_g: 5.0       # minimum weight to consider a bottle as present

# Patient Monitoring Configuration
patient_monitoring:
  enabled: true
  duration_seconds: 30       # how long to watch after pill removal
  fps: 20                    # capture frame rate
  device_id: 0               # camera device id (must match hardware.camera.device_id)

  # MediaPipe thresholds
  mediapipe:
    mouth_open_ratio: 0.04   # inner-lip gap / face height  (higher = harder to trigger)
    proximity_ratio:  0.18   # fingertip-mouth dist / frame min dim (higher = wider zone)
    cooldown_secs:    2.5    # min seconds between counted intakes

  detection:
    swallow:
      enabled: true
      sensitivity: 0.85
    cough:
      enabled: false
      sensitivity: 0.80
    hand_motion:
      enabled: true

# Telegram Bot Configuration
telegram:
  enabled: true
  bot_token: "YOUR_BOT_TOKEN_HERE"       # Get from @BotFather
  patient_chat_id: "YOUR_PATIENT_CHAT_ID"
  caregiver_chat_id: "YOUR_CAREGIVER_CHAT_ID"
  retry_attempts: 3
  retry_delay_seconds: 5

# Medication Schedule
# Note: medicine_id is resolved at runtime from the database (via registration).
# The 'name' field here is only used for the Telegram reminder text and display.
# It does NOT need to match the tag payload exactly.
schedule:
  medications:
    - name: "Aspirin 100mg"
      station_id: "station_1"
      dosage_pills: 2
      times: ["08:00", "20:00"]

    - name: "Paracetamol 500mg"
      station_id: "station_2"
      dosage_pills: 2
      times: ["08:00", "20:00"]

  reminder:
    advance_minutes: 5   # remind 5 minutes before scheduled time
    timeout_minutes: 30  # consider missed after 30 minutes

# Decision Engine Rules
decision_engine:
  tolerance:
    pill_count: 0  # 0 = exact match required; 1 = +-1 pill allowed

  verification:
    require_ocr: false      # identity failure alone does not fail verification
    require_weight: true    # weight verification is mandatory
    require_monitoring: true

  alerts:
    missed_dose: true
    incorrect_dosage: true
    behavioral_issue: true

# Database Configuration
database:
  path: "data/medication_events.db"
  backup_enabled: true
  backup_interval_hours: 24

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  console_output: true
  file_output: true
  max_file_size_mb: 10
  backup_count: 5

# Performance Configuration
performance:
  max_cpu_percent: 80
  max_memory_mb: 3072  # leave 1 GB for OS on 4 GB Pi
  enable_throttling: true

# Network Configuration
network:
  offline_mode_enabled: true
  queue_alerts: true
  check_interval_seconds: 60

# Privacy Configuration
privacy:
  store_images: false
  store_video: false
  anonymize_logs: true
  data_retention_days: 30

# Measurement & Profiling (enable during validation phase)
profiling:
  enabled: false
  latency_logging: true
  resource_logging: true
  log_interval_seconds: 1
