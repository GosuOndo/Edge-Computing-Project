# Smart Medication System Configuration
# Copy this file to config.yaml and fill in your actual values

# System Settings
system:
  name: "Smart Medication Verification System"
  version: "1.0.0"
  location: "Singapore, SG"
  timezone: "Asia/Singapore"

# Hardware Configuration
hardware:
  camera:
    device_id: 0  # /dev/video0
    resolution: [640, 480]
    fps: 30

  display:
    width: 1024
    height: 600
    fullscreen: false  # set to true for production deployment



  audio:
    enabled: true
    playback_mode: "alsa_pipe"
    output_device: "plughw:CARD=vc4hdmi0,DEV=0"
    volume: 0.8


# MQTT Configuration
mqtt:
  broker_host: "localhost"
  broker_port: 1883
  client_id: "medication_system_pi"
  topics:
    weight_data: "medication/weight/+"
    commands: "medication/command"
    status: "medication/status/+"
  qos: 1
  keepalive: 60

# Weight Sensor Configuration
weight_sensors:
  station_1:
    id: "station_1"
    tag_reader_id: "tag_reader_1"   # RFID reader mounted under this station's scale
    medicine_name: "Aspirin 100mg"  # updated automatically on registration
    pill_weight_mg: 290             # fallback only: overridden at runtime by W= field in NFC tag
    threshold_stable_g: 0.05        # stability threshold
    threshold_delta_g: 0.22         # minimum change to consider a delta
    event_settle_seconds: 1.5       # how long weight must be stable before firing
    event_cooldown_seconds: 2.0     # minimum gap between two events
    min_delta_g: 0.20               # below this = scale noise, not a pill removal

  station_2:
    id: "station_2"
    tag_reader_id: "tag_reader_2"   # RFID reader mounted under this station's scale
    medicine_name: "Paracetamol 500mg"  # updated automatically on registration
    pill_weight_mg: 290             # fallback only: overridden at runtime by W= field in NFC tag
    threshold_stable_g: 0.05        # stability threshold
    threshold_delta_g: 0.22         # minimum change to consider a delta
    event_settle_seconds: 1.5       # how long weight must be stable before firing
    event_cooldown_seconds: 2.0     # minimum gap between two events
    min_delta_g: 0.20               # below this = scale noise, not a pill removal

# OCR Configuration (fallback identity method)
ocr:
  language: "eng"
  config: "--psm 11"
  min_confidence: 0.75
  preprocessing:
    grayscale: true
    denoise: true
    threshold: true

# Identity Verification Configuration
# Primary: integrated RFID tag (bottle bottom tag, reader under scale)
# Fallback: QR code scan, then OCR label scan
identity:
  primary_method: "tag"
  fallback_methods: ["qr", "ocr"]

  tag:
    enabled: true
    mqtt_topic: "medication/tag/read/+"
    integrated_mode: true
    coincident_window_seconds: 15.0
    command_topics:
      station_1: "medication/tag/command/tag_reader_1"
      station_2: "medication/tag/command/tag_reader_2"
    max_attempts: 1
    attempt_timeout_seconds: 3

  qr:
    enabled: true
    max_attempts: 1

  ocr:
    enabled: true
    max_attempts: 1

# Registration Configuration
registration:
  enabled: true
  timeout_seconds: 120
  coincident_window_seconds: 8.0
  min_bottle_weight_g: 5.0

# Patient Monitoring Configuration
patient_monitoring:
  enabled: true
  duration_seconds: 30
  fps: 20
  device_id: 0

  mediapipe:
    mouth_open_ratio: 0.04
    proximity_ratio:  0.18
    cooldown_secs:    2.5

  detection:
    swallow:
      enabled: true
      sensitivity: 0.85
    cough:
      enabled: false
      sensitivity: 0.80
    hand_motion:
      enabled: true

# Telegram Bot Configuration
telegram:
  enabled: true
  bot_token: "YOUR_BOT_TOKEN_HERE"       # Get from @BotFather
  patient_chat_id: "YOUR_PATIENT_CHAT_ID"
  caregiver_chat_id: "YOUR_CAREGIVER_CHAT_ID"
  retry_attempts: 3
  retry_delay_seconds: 5

# Medication schedules are stored in the database after onboarding.
# Only reminder behavior remains configurable here.
reminder:
    advance_minutes: 5
    timeout_minutes: 30

# Decision Engine Rules
decision_engine:
  tolerance:
    pill_count: 0

  verification:
    require_ocr: false
    require_weight: true
    require_monitoring: true

  alerts:
    missed_dose: true
    incorrect_dosage: true
    behavioral_issue: true

# Database Configuration
database:
  path: "data/medication_events.db"
  backup_enabled: true
  backup_interval_hours: 24

# Logging Configuration
logging:
  level: "INFO"
  console_output: true
  file_output: true
  max_file_size_mb: 10
  backup_count: 5

# Performance Configuration
performance:
  max_cpu_percent: 80
  max_memory_mb: 3072
  enable_throttling: true

# Network Configuration
network:
  offline_mode_enabled: true
  queue_alerts: true
  check_interval_seconds: 60

# Privacy Configuration
privacy:
  store_images: false
  store_video: false
  anonymize_logs: true
  data_retention_days: 30

# Measurement & Profiling (enable during validation phase)
profiling:
  enabled: false
  latency_logging: true
  resource_logging: true
  log_interval_seconds: 1
